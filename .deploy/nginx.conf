server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location = /storybook {
        return 301 /storybook/;
    }

    # 1) Only handle the exact "/storybook/" path here
    location = /storybook/ {
        # If there is no "path" query param, redirect to your welcome story
        if ($arg_path = "") {
            return 302 $scheme://$http_host/storybook/?path=/story/welcome--overview;
        }

        # If there IS a path param, just serve Storybook (index.html)
        try_files /index.html =404;
    }

    # 2) Everything else under /storybook/: normal Storybook static + SPA fallback
    location /storybook/ {
        # Serve actual files (JS, CSS, images, iframe.html, etc.)
        # and only fall back to index.html if no file exists
        try_files $uri $uri/ /index.html;
    }
}
